  <h1>Membros</h1>

  <table class="alt">
    <thead>
      <tr>
        <th>Id</th>
        <th>Nome</th>
        <th>Telefone</th>
      </tr>
    </thead>

    <tbody>
      @for(member of members; track member)
      {
        <tr (click)="memberClicked(member)">
          <td>{{ member.id }}</td>
          <td>{{ member.name }} {{ member.surname }}</td>
          <td>{{ member.phone }}</td>
        </tr>
      }
    </tbody>
  </table>

  <button (click)="newMember()" class="button primary">Novo Membro</button>
